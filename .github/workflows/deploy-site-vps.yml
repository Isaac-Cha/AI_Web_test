name: Deploy site to VPS (build + SSH)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tsconfig*.json'
      - 'tailwind.config.*'
      - 'postcss.config.*'
      - '.github/workflows/deploy-site-vps.yml'

concurrency:
  group: deploy-site-vps
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_SITE_TARGET_DIR: ${{ secrets.VPS_SITE_TARGET_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate secrets
        run: |
          set -e
          if [ -z "${VPS_HOST}" ] || [ -z "${VPS_USER}" ] || [ -z "${VPS_PASSWORD}" ] || [ -z "${VPS_PORT}" ] || [ -z "${VPS_SITE_TARGET_DIR}" ]; then
            echo "Missing required secrets. Please set VPS_HOST, VPS_USER, VPS_PASSWORD, VPS_PORT, VPS_SITE_TARGET_DIR in GitHub Actions Secrets."
            exit 1
          fi

      - name: Debug target dir
        run: |
          set -e
          echo "VPS_SITE_TARGET_DIR length: ${#VPS_SITE_TARGET_DIR}"
          printf 'VPS_SITE_TARGET_DIR bytes: ' && printf %s "$VPS_SITE_TARGET_DIR" | od -An -t x1

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure target directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_PORT }}
          script: |
            mkdir -p "${{ env.VPS_SITE_TARGET_DIR }}"

      - name: Upload dist via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_PORT }}
          timeout: 120s
          command_timeout: 15m
          source: "dist/**"
          strip_components: 1
          target: ${{ env.VPS_SITE_TARGET_DIR }}
          overwrite: true
          tar_tmp_path: /tmp
          debug: true

